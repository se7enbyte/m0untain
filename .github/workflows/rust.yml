name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Core tests / Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use stable Rust
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test detection core
        run: cargo test -p sentinel-core --locked

  app-windows:
    name: App build / Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use stable Rust
        shell: pwsh
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Build m0untain binary
        run: cargo build -p m0untain --locked --verbose
